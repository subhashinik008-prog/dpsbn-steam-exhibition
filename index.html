<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DPSBN STEAM Exhibition</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#122a73,#04081f 70%);color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:auto;padding:env(safe-area-inset-top,20px) env(safe-area-inset-right,12px) env(safe-area-inset-bottom,20px) env(safe-area-inset-left,12px)}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(#4cf3ff33 1px,transparent 1px);background-size:28px 28px;opacity:.18}
.frame{position:relative;width:min(900px,100%);max-width:920px;padding:clamp(12px,4vw,28px);border:2px solid #49c8ff;border-radius:34px;background:rgba(8,16,52,.55);box-shadow:0 0 25px #2aa8ff80,inset 0 0 20px #102d6a;max-height:calc(100vh - 40px);overflow:auto}
.logo{width:90px;max-width:90px;height:auto;max-height:90px;border-radius:50%;display:block;margin:0 auto 10px;background:#fff;padding:4px;object-fit:contain}
.small{font-size:clamp(1.1rem,3.2vw,2rem);text-align:center;font-weight:700}
.big{text-align:center;font-size:clamp(2rem,6vw,4.2rem);font-weight:900;letter-spacing:2px;background:linear-gradient(#fff,#9fd2ff,#fff);-webkit-background-clip:text;color:transparent;text-shadow:0 0 12px #5fb8ff}
.dept{text-align:center;font-size:clamp(1rem,3vw,2.4rem);color:#59d8ff;font-weight:700}
.rule{height:2px;background:linear-gradient(90deg,#ff5cff,#46d7ff,#ff5cff);margin:18px auto;width:80%}
.q{border:2px solid #9d4dff;border-radius:24px;padding:18px;background:rgba(8,10,40,.5);font:italic clamp(1.3rem,4vw,2.2rem) Georgia,serif;text-align:center;line-height:1.35}
input{margin:18px 0;width:100%;padding:14px;border-radius:14px;border:2px solid #4ca8ff;background:#0d1738;color:#fff;font-size:clamp(1rem,3.6vw,1.2rem)}
button{display:block;margin:12px auto;width:36%;padding:16px;border:none;border-radius:50px;font-size:1.6rem;font-weight:800;background:linear-gradient(#3ee65f,#08963d);color:#fff;box-shadow:0 0 20px #39ff6c;cursor:pointer}
#msg{text-align:center;margin-top:18px;font-size:1.1rem}
.success-text{display:inline-block;color:#7dff9d;font-size:clamp(1.8rem,6vw,3.2rem);font-weight:900;letter-spacing:0.02em;text-shadow:0 0 18px rgba(125,255,157,0.25);line-height:1}
.success-emoji{font-size:clamp(1.8rem,6vw,3.2rem);vertical-align:middle;margin-right:8px}
.error-text{display:inline-block;color:#ff8b8b;font-size:clamp(1.8rem,6vw,3.2rem);font-weight:800;vertical-align:middle}
.error-emoji{font-size:clamp(1.8rem,6vw,3.2rem);vertical-align:middle;margin-right:8px}
.decor{position:absolute;color:#4b73ff66;font-size:4rem;font-weight:bold}
.pi{top:10px;right:20px}.sqrt{left:20px;top:300px}.fx{right:20px;top:300px}
.tag{text-align:center;margin-top:14px;color:#5fe4ff;font-size:1.1rem}
canvas{position:fixed;inset:0;pointer-events:none}
@media(max-width:700px){.big{font-size:clamp(1.8rem,6vw,3rem)}.dept{font-size:1.2rem}.q{font-size:clamp(1.25rem,4.2vw,1.8rem)}button{width:86%}}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div class="frame">
<img class="logo" src="assets/dps-logo.jpeg" alt="DPSBN Logo">
<div class="small">Welcome to DPSBN</div>
<div class="big">STEAM EXHIBITION</div>
<div class="dept">Math Department</div>
<div class="rule"></div>
<div class="q">I am an odd number.<br>Remove one letter,<br>I become even.<br>What number am I?</div>
<input id="ans" placeholder="Type your answer">
<button id="check">SUBMIT →</button>
<div id="msg"></div>
<div class="tag">🧠 Think. Solve. Innovate.</div>
<div class="decor pi">π</div><div class="decor sqrt">√2</div><div class="decor fx">ƒ(x)</div>
</div>
<script>
const answers=["seven","7"];
check.onclick=()=>{
 let ok=answers.includes(ans.value.trim().toLowerCase());
 msg.style.color=ok?"#7dff9d":"#ff9090";
 if(ok) {
   msg.innerHTML = "<span class='success-emoji'>🎉</span> <span class='success-text'>ACCESS GRANTED!</span>";
   launch();
 } else {
   msg.innerHTML = "<span class='error-emoji'>❌</span> <span class='error-text'>Incorrect! Try again.</span>";
 }
}
function launch(){
const c=fx,x=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;
let p=[...Array(250)].map(()=>({x:Math.random()*c.width,y:-Math.random()*c.height,r:2+Math.random()*4,v:2+Math.random()*4,c:["#0ff","#f0f","#ff0","#0f0"][Math.floor(Math.random()*4)]}));
(function a(){x.clearRect(0,0,c.width,c.height);let live=false;
p.forEach(o=>{o.y+=o.v;if(o.y<c.height){live=true;x.fillStyle=o.c;x.beginPath();x.arc(o.x,o.y,o.r,0,6.28);x.fill();}});
if(live)requestAnimationFrame(a);})();
}
</script>
</body></html>
